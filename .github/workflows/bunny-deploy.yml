name: Deploy to S3

on:
  push:
    branches:
      - production

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync ./Game "s3://${{ secrets.S3_BUCKET }}/Games/Arcade Games/Flappy Wings/VegaOS/App Data/" \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*"

      - name: Purge BunnyCDN Cache
        run: |
          curl -X POST "https://api.bunny.net/pullzone/${{ secrets.BUNNY_PULL_ZONE_ID }}/purgeCache" \
          -H "AccessKey: ${{ secrets.BUNNY_STORAGE_PASSWORD }}" \
          -H "Content-Type: application/json"



